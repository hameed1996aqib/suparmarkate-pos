name: Build Muhaseb Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  desktop-windows:
    name: Desktop Windows Installer
    runs-on: windows-latest
    env:
      DATABASE_URL: postgresql://supermarket:supermarket_password@localhost:5432/supermarket_db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck API
        run: npm run typecheck:api

      - name: Typecheck Desktop
        run: npm --workspace @supermarket/desktop run typecheck

      - name: Build Windows installer
        run: npm run dist:desktop:win

      - name: Upload desktop installer
        uses: actions/upload-artifact@v4
        with:
          name: Muhaseb-Windows-Installer
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest*.yml
          if-no-files-found: error

  server-docker-bundle:
    name: Server Docker Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t muhaseb-api:local -f apps/api/Dockerfile .

      - name: Create server bundle
        shell: bash
        run: |
          set -euo pipefail

          bundle="release-server/Muhaseb-Server-Docker"
          mkdir -p "$bundle/apps/api"

          cp docker-compose.yml "$bundle/"
          cp .dockerignore "$bundle/"
          cp .env.docker.example "$bundle/"
          docker save muhaseb-api:local -o "$bundle/muhaseb-api-local.tar"

          cp apps/api/Dockerfile "$bundle/apps/api/"
          cp apps/api/package.json "$bundle/apps/api/"
          cp apps/api/tsconfig.json "$bundle/apps/api/"
          cp -r apps/api/src "$bundle/apps/api/src"
          cp -r apps/api/prisma "$bundle/apps/api/prisma"

          cp -r scripts "$bundle/scripts"
          cp docs/docker-server-setup.md "$bundle/docker-server-setup.md"

          (cd release-server && zip -r Muhaseb-Server-Docker.zip Muhaseb-Server-Docker)

      - name: Upload server Docker bundle
        uses: actions/upload-artifact@v4
        with:
          name: Muhaseb-Server-Docker
          path: release-server/Muhaseb-Server-Docker.zip
          if-no-files-found: error
