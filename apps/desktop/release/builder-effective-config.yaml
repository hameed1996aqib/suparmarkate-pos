directories:
  output: release
  buildResources: build
appId: af.muhaseb.desktop
productName: Muhaseb
files:
  - filter:
      - dist/**/*
      - electron/**/*
      - package.json
win:
  target: nsis
  icon: icon.ico
extraResources:
  - from: build/icon.png
    to: icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
electronVersion: 42.1.0
