services:
  postgres:
    image: postgres:16-alpine
    container_name: muhaseb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: supermarket
      POSTGRES_PASSWORD: supermarket_password
      POSTGRES_DB: supermarket_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - supermarket_postgres_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supermarket -d supermarket_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: muhaseb_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lfu"]
    volumes:
      - supermarket_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: muhaseb-api:local
    container_name: muhaseb_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://supermarket:supermarket_password@postgres:5432/supermarket_db
      PORT: 4000
      POS_WS_PORT: 4001
      SYSTEM_HEALTH_WS_PORT: 4002
      JWT_SECRET: ${JWT_SECRET:-change-this-production-secret-at-least-24-characters}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      BACKUP_DIR: /data/backups
      BACKUP_SCHEDULE_ENABLED: ${BACKUP_SCHEDULE_ENABLED:-true}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-7}
      SERVER_CONFIG_PATH: /data/server-config.json
      BACKUP_UPLOADS_ENABLED: "true"
      PG_DUMP_PATH: pg_dump
      PG_RESTORE_PATH: pg_restore
      PG_DOCKER_FALLBACK: "false"
      API_SLOW_REQUEST_MS: ${API_SLOW_REQUEST_MS:-750}
      DISK_WARNING_PERCENT: ${DISK_WARNING_PERCENT:-15}
      CPU_WARNING_PERCENT: ${CPU_WARNING_PERCENT:-85}
      CPU_CRITICAL_PERCENT: ${CPU_CRITICAL_PERCENT:-95}
      MEMORY_WARNING_FREE_PERCENT: ${MEMORY_WARNING_FREE_PERCENT:-15}
      MEMORY_CRITICAL_FREE_PERCENT: ${MEMORY_CRITICAL_FREE_PERCENT:-5}
      STOCK_RECONCILIATION_ENABLED: ${STOCK_RECONCILIATION_ENABLED:-true}
      STOCK_RECONCILIATION_INTERVAL_HOURS: ${STOCK_RECONCILIATION_INTERVAL_HOURS:-24}
      JOB_WORKER_ENABLED: ${JOB_WORKER_ENABLED:-true}
      JOB_WORKER_POLL_MS: ${JOB_WORKER_POLL_MS:-2000}
      RETENTION_INTERVAL_HOURS: ${RETENTION_INTERVAL_HOURS:-24}
      AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-730}
      QR_TOKEN_RETENTION_DAYS: ${QR_TOKEN_RETENTION_DAYS:-30}
      SESSION_RETENTION_DAYS: ${SESSION_RETENTION_DAYS:-30}
      JOB_RETENTION_DAYS: ${JOB_RETENTION_DAYS:-30}
      EXPORT_RETENTION_DAYS: ${EXPORT_RETENTION_DAYS:-7}
      EXPORT_DIR: /data/exports
      BACKUP_MAX_AGE_HOURS: ${BACKUP_MAX_AGE_HOURS:-30}
      RECONCILIATION_MAX_AGE_HOURS: ${RECONCILIATION_MAX_AGE_HOURS:-36}
      PARTITION_WARNING_ROWS: ${PARTITION_WARNING_ROWS:-10000000}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-change-me-now}
    ports:
      - "4000:4000"
      - "4001:4001"
      - "4002:4002"
    volumes:
      - muhaseb_api_data:/data
      - muhaseb_uploads:/app/apps/api/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  supermarket_postgres_data:
  supermarket_redis_data:
  muhaseb_api_data:
  muhaseb_uploads:
